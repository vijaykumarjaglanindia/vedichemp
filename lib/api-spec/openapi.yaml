openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: compliance
    description: Compliance and prohibition enforcement status
paths:
  /prohibitions:
    get:
      operationId: getProhibitionStatus
      tags: [compliance]
      summary: Prohibition enforcement status
      description: Returns the enforcement status of prohibitions A1-A6, read live from the database's prohibition_status view.
      responses:
        "200":
          description: Enforcement status for each prohibition
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProhibitionStatus"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
components:
  schemas:
    ProhibitionStatus:
      type: object
      properties:
        code:
          type: string
        enforced:
          type: boolean
      required:
        - code
        - enforced
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

